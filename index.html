<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gratitude Jar</title>
  <script type="module" src="script.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 500px;
      margin: 50px auto;
      text-align: center;
    }
    input, button {
      padding: 10px;
      margin: 5px;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    li {
      background: #f4f4f4;
      margin: 5px 0;
      padding: 10px;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <h1>🌸 Gratitude Jar 🌸</h1>

  <input type="text" id="gratitude-input" placeholder="What are you grateful for today?">
  <br>
  <button id="save-btn">Save</button>
  <button id="random-btn">Show Random</button>

  <h2>Your Entries</h2>
  <ul id="entries-list"></ul>
</body>
</html>
